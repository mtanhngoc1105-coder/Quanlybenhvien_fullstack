<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone icon background -->
  <defs>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="32" cy="32" r="30" fill="url(#phoneGrad)"/>
  
  <!-- Phone shape -->
  <rect x="18" y="12" width="28" height="40" rx="4" fill="white" opacity="0.9"/>
  <rect x="20" y="14" width="24" height="28" rx="2" fill="#4A90E2"/>
  <circle cx="32" cy="48" r="2.5" fill="white" opacity="0.9"/>
  
  <!-- Speaker holes -->
  <circle cx="28" cy="16" r="1" fill="white" opacity="0.7"/>
  <circle cx="36" cy="16" r="1" fill="white" opacity="0.7"/>
</svg>